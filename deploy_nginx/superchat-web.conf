map $http_x_forwarded_proto $storwyz_forwarded_proto {
    default $scheme;
    ~*^https$ https;
}

server {
    listen 80 default_server;
    server_name storwyz.com www.storwyz.com feed.storwyz.com catalog.storwyz.com;

    client_max_body_size 50M;

    if ($storwyz_forwarded_proto != https) {
        return 301 https://$host$request_uri;
    }

    location /static/ {
        alias /opt/superchat-ai-agent/web/staticfiles/;
    }

    location /media/ {
        alias /opt/superchat-ai-agent/web/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $storwyz_forwarded_proto;
        proxy_set_header X-Forwarded-Port 443;
        proxy_redirect off;
    }
}
